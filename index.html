  .flag-toggle {
    position: absolute; top: 12px; right: 8px;

    border: 2px solid rgba(255,255,255,0.5); border-radius: 18px;
    background: rgba(255,255,255,0.18); color: #fff;
    font-size: 24px; font-weight: 900;
    padding: 12px 18px; min-height: 56px;
    display: flex; align-items: center; gap: 8px;

  .flag-toggle:active { background: rgba(255,255,255,0.35); }
  .logo {

  .subtitle { font-size: 26px; font-weight: 700; color: #ffd23f; margin-bottom: 48px; }
  .big-btn {
    font-family: inherit; text-transform: uppercase;
    border: none; border-radius: 28px;
    font-weight: 900; cursor: pointer;
    min-height: 90px; padding: 0 56px;
    font-size: 36px; color: #7a0a14;
    background: linear-gradient(180deg, #ffe27a 0%, #ffcc00 100%);
    box-shadow: 0 8px 0 #b8860b;
    transition: transform .08s, box-shadow .08s;

  .level-btn { width: 100%; display:flex; align-items:center; justify-content:center; gap: 14px; }
  .level-btn .stars { font-size: 26px; letter-spacing: -2px; }

  /* ---- QUIZ SCREEN ---- */
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom: 22px; }
  .progress { font-size: 24px; font-weight: 800; color: #ffd23f; }
  .level-badge {
    font-size: 18px; font-weight: 900; color: #7a0a14;
    background: linear-gradient(180deg, #ffe27a 0%, #ffcc00 100%);
    padding: 7px 16px; border-radius: 16px; white-space: nowrap;

  .dot { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .dot.done { background: #ffd23f; }
  .dot.cur { background: #e8eaed; box-shadow: 0 0 0 4px rgba(232,234,237,0.4); }

    text-align: center; margin: 10px 0 28px;

  .answer {

    border: none; border-radius: 22px;
    min-height: 92px; padding: 16px 26px;

  .answer:active { transform: translateY(4px); box-shadow: 0 2px 0 #9aa0a8; }
  .answer .label {
    flex: 0 0 auto; width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(180deg, #ffe27a 0%, #ffcc00 100%); color: #7a0a14;
    display:flex; align-items:center; justify-content:center;

  .answer.locked { pointer-events: none; }
  .answer.correct { background: #2ecc71; color: #fff; box-shadow: 0 6px 0 #1e9c54; }
  .answer.correct .label { background: rgba(255,255,255,0.3); }
  .answer.wrong { background: #ff4d5e; color: #fff; box-shadow: 0 6px 0 #c12b3a; }
  .answer.wrong .label { background: rgba(255,255,255,0.3); }
  .answer.dim { opacity: 0.45; }

  .feedback {
    text-align:center; font-size: 34px; font-weight: 900;
    min-height: 46px; margin: 26px 0 14px; line-height: 1.1;
  }
  .feedback.good { color: #ffd23f; }
  .feedback.bad { color: #fff; }

  .next-wrap { display:flex; justify-content:center; margin-top: 6px; min-height: 96px; }
  .hidden { visibility: hidden; }

  #summary { align-items: center; text-align: center; }

  .sum-score { font-size: 80px; font-weight: 900; color: #ffd23f; line-height: 1; margin-bottom: 6px; }
  .sum-msg { font-size: 34px; font-weight: 900; margin-bottom: 24px; line-height: 1.15; }
  .review { width: 100%; max-width: 760px; display:flex; flex-direction:column; gap: 12px; margin-bottom: 28px; }
  .review-item {
    display:flex; align-items:center; gap: 16px;
    background: rgba(255,255,255,0.14); border-radius: 18px;

  .review-item .ra { font-size: 17px; font-weight: 700; color: #ffd23f; margin-top: 3px; }
  .sum-buttons { display:flex; flex-direction:column; gap: 16px; align-items:center; }
  .ghost-btn {
    background: rgba(255,255,255,0.16); color: #fff;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25);

/* ============ AUDIO (Web Audio API) ============ */
let audioCtx = null;
function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function tone(freq, start, dur, type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  const t = audioCtx.currentTime + start;
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}
function playCorrect() {
  initAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => tone(f, i * 0.12, 0.18, "triangle"));
}
function playWrong() {

/* ============ CONFETTI ============ */
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
let confettiPieces = [];
let confettiRAF = null;
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const CONFETTI_COLORS = ["#ffcc00", "#ffd23f", "#d62828", "#c1121f", "#e8eaed", "#c0c5cc", "#b8860b", "#ffffff"];
function launchConfetti(amount) {
  for (let i = 0; i < amount; i++) {
    confettiPieces.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * canvas.height * 0.3,
      w: 8 + Math.random() * 8,
      h: 10 + Math.random() * 10,
      color: CONFETTI_COLORS[(Math.random() * CONFETTI_COLORS.length) | 0],
      vy: 2 + Math.random() * 4,
      vx: -2 + Math.random() * 4,
      rot: Math.random() * Math.PI,
      vr: -0.2 + Math.random() * 0.4
    });
  }
  if (!confettiRAF) confettiRAF = requestAnimationFrame(stepConfetti);
}
function stepConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = confettiPieces.length - 1; i >= 0; i--) {
    const p = confettiPieces[i];
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
    if (p.y > canvas.height + 30) confettiPieces.splice(i, 1);
  }
  if (confettiPieces.length > 0) {
    confettiRAF = requestAnimationFrame(stepConfetti);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiRAF = null;
  }
}

/* ============ HELPERS ============ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ============ GAME ============ */
function startGame(level) {
  initAudio();
  if (!POOLS[lang][level]) level = "latt";
  activePool = POOLS[lang][level];
  document.getElementById("levelBadge").textContent = I18N[lang].badges[level];
  order = shuffle([...Array(activePool.length).keys()]);
  poolPos = 0;
  startRound();
}
function startRound() {
  if (poolPos + 5 > order.length) {        // not enough left -> reshuffle
    order = shuffle([...Array(activePool.length).keys()]);
    poolPos = 0;
  }
  round = order.slice(poolPos, poolPos + 5).map(idx => activePool[idx]);
  poolPos += 5;
  currentQ = 0;
  score = 0;
  answers = [];
  showScreen("quiz");
  renderQuestion();
}
function renderQuestion() {
  answered = false;
  const item = round[currentQ];
  document.getElementById("progress").textContent = I18N[lang].progress(currentQ + 1);

  // dots
  const dots = document.getElementById("dots");
  dots.innerHTML = "";
  for (let i = 0; i < 5; i++) {
    const d = document.createElement("div");
    d.className = "dot" + (i < currentQ ? " done" : i === currentQ ? " cur" : "");
    dots.appendChild(d);
  }

  document.getElementById("question").textContent = item.q;

  const labels = ["1", "X", "2"];
  const answersEl = document.getElementById("answers");
  answersEl.innerHTML = "";
  item.a.forEach((txt, i) => {
    const btn = document.createElement("button");
    btn.className = "answer";
    btn.innerHTML = '<span class="label">' + labels[i] + '</span><span class="txt">' + txt + '</span>';
    btn.addEventListener("click", () => chooseAnswer(i));
    answersEl.appendChild(btn);
  });

  const fb = document.getElementById("feedback");
  fb.textContent = ""; fb.className = "feedback";
  document.getElementById("nextBtn").classList.add("hidden");
}
function chooseAnswer(chosen) {
  if (answered) return;
  answered = true;
  const item = round[currentQ];
  const correctIdx = item.correct;
  const btns = document.querySelectorAll("#answers .answer");
  btns.forEach((b, i) => {
    b.classList.add("locked");
    if (i === correctIdx) b.classList.add("correct");
    else if (i === chosen) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  answers.push({ chosen, correct: correctIdx });
  const t = I18N[lang];
  const fb = document.getElementById("feedback");
  if (chosen === correctIdx) {
    score++;
    fb.textContent = t.praise[(Math.random() * t.praise.length) | 0];
    fb.className = "feedback good";
    playCorrect();
    launchConfetti(80);
  } else {
    fb.textContent = t.wrong;
    fb.className = "feedback bad";
    playWrong();
  }

  const nextBtn = document.getElementById("nextBtn");
  nextBtn.textContent = currentQ < 4 ? t.nextQ : t.seeResult;
  nextBtn.classList.remove("hidden");
}
function nextQuestion() {
  currentQ++;
  if (currentQ < 5) renderQuestion();
  else showSummary();
}
function showSummary() {
  showScreen("summary");
  document.getElementById("sumScore").textContent = score + "/5";

  const idx = score <= 1 ? 0 : score - 1;   // 0-1→0, 2→1, 3→2, 4→3, 5→4
  document.getElementById("sumEmoji").textContent = SUMMARY_EMOJI[idx];
  document.getElementById("sumMsg").textContent = I18N[lang].summary[idx];

  const review = document.getElementById("review");
  review.innerHTML = "";
  round.forEach((item, i) => {
    const ans = answers[i];
    const ok = ans && ans.chosen === ans.correct;
    const div = document.createElement("div");
    div.className = "review-item";
    div.innerHTML =
      '<span class="mark">' + (ok ? "✅" : "❌") + '</span>' +
      '<div><div class="rq">' + item.q + '</div>' +
      '<div class="ra">' + I18N[lang].correctLabel + item.a[item.correct] + '</div></div>';
    review.appendChild(div);
  });

  if (score === 5) {
    launchConfetti(180);
    setTimeout(() => launchConfetti(120), 400);
  }
}

/* ============ LANGUAGE ============ */
function applyLang() {
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.title = t.title;
  document.getElementById("logoText").textContent = t.title;
  document.getElementById("subtitle").textContent = t.subtitle;
  document.querySelectorAll(".level-btn").forEach(btn => {
    btn.querySelector(".lbl").textContent = t.levels[btn.dataset.level];
  });
  document.getElementById("flagBtn").textContent = t.flag;
  document.getElementById("againBtn").textContent = t.newRound;
  document.getElementById("levelBtn").textContent = t.changeLevel;
}
function toggleLang() {
  lang = (lang === "sv") ? "en" : "sv";
  try { localStorage.setItem("tp_lang", lang); } catch (e) {}
  applyLang();
}

/* ============ EVENTS ============ */
document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => startGame(btn.dataset.level));
});
document.getElementById("flagBtn").addEventListener("click", toggleLang);
document.getElementById("nextBtn").addEventListener("click", nextQuestion);
document.getElementById("againBtn").addEventListener("click", startRound);
document.getElementById("levelBtn").addEventListener("click", () => showScreen("start"));

applyLang();

// prevent double-tap zoom
document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
</script>
